name: Deploy JARVIS to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Groq API key into config.js
        run: |
          cat > config.js << 'ENDOFFILE'
          const GROQ_CONFIG = {
            apiKey: "GROQ_KEY_PLACEHOLDER",
            model: "llama-3.1-8b-instant",
            endpoint: "https://api.groq.com/openai/v1/chat/completions"
          };
          ENDOFFILE
          sed -i "s|GROQ_KEY_PLACEHOLDER|${{ secrets.GROQ_API_KEY }}|g" config.js

      - name: Allow config.js through gitignore for Pages upload
        run: sed -i '/config\.js/d' .gitignore

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
